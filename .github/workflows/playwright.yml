name: Playwright Tests
env:
    BASE_URL: ${{ secrets.BASE_URL }}
    USER_EMAIL: ${{ secrets.USER_EMAIL }}
    USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4          # ✅ Was commented out — REQUIRED

    - uses: actions/setup-node@v4        # ✅ Was commented out — REQUIRED
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers  # ✅ Moved BEFORE running tests
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        USER_EMAIL: ${{ secrets.USER_EMAIL }}
        USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      run: npx playwright test

    - uses: actions/upload-artifact@v6   # ✅ Updated to v6 (Node.js 24)
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30